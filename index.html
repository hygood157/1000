<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart.sys / Root_Gateway</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            background-color: #050505;
            color: #0f0;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            margin: 0;
            padding: 2rem;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        /* 復古 CRT 螢幕掃描線特效 */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal-output {
            white-space: pre-wrap;
            margin-bottom: 1rem;
        }

        .input-line {
            display: none; /* 動畫結束前隱藏 */
            align-items: center;
        }

        .prompt {
            color: #0f0;
            margin-right: 10px;
        }

        input[type="password"], input[type="text"] {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            outline: none;
            width: 50%;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #0f0;
            animation: blink 1s step-end infinite;
        }

        .error { color: #f00; text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); }
        .success { color: #0ff; text-shadow: 0 0 5px rgba(0, 255, 255, 0.5); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="terminal-output"></div>
    <div class="input-line" id="input-container">
        <span class="prompt">root@heart-sys:~#</span>
        <input type="password" id="password-input" autocomplete="off" autofocus>
    </div>

 <script>
        // ---------------------------------------------------------
        // 1. 設定你們的專屬通關密碼 
        const CORRECT_PASSWORD = "1012"; 
        
        // 2. 這裡必須跳轉到選擇題關卡
        const NEXT_STEP_URL = "challenge.html"; 
        // ---------------------------------------------------------

        const outputDiv = document.getElementById('terminal-output');
        const inputContainer = document.getElementById('input-container');
        const passwordInput = document.getElementById('password-input');

        const bootSequence = [
            "INITIALIZING HEART & BRAIN FIREWALL v2.0...",
            "Loading memory modules... [OK]",
            "Scanning for unauthorized entities... [FAILED]",
            "WARNING: Persistent threat detected.",
            "Entity Name: 刘滈阳",
            "Duration of Infection: 1000 DAYS",
            "Action Required: Identity Verification.",
            " ",
            "To proceed with the quarantine protocol, please enter the ROOT PASSWORD."
        ];

        let lineIndex = 0;

        function typeLine() {
            if (lineIndex < bootSequence.length) {
                const p = document.createElement('div');
                p.textContent = bootSequence[lineIndex];
                outputDiv.appendChild(p);
                lineIndex++;
                setTimeout(typeLine, 400); 
            } else {
                inputContainer.style.display = 'flex';
                passwordInput.focus();
            }
        }

        window.onload = () => {
            setTimeout(typeLine, 1000);
        };

        passwordInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const attempt = passwordInput.value;
                passwordInput.value = '';
                
                const responseLog = document.createElement('div');

                if (attempt === CORRECT_PASSWORD) {
                    // 【修改重點 1】答對密碼後，直接把輸入框和 root@heart-sys:~# 徹底隱藏起來！
                    inputContainer.style.display = 'none';
                    
                    responseLog.textContent = "ACCESS GRANTED. Redirecting to secure channel...";
                    responseLog.className = 'success';
                    outputDiv.appendChild(responseLog);
                    
                    setTimeout(() => {
                        window.location.href = NEXT_STEP_URL;
                    }, 1500);
                } else {
                    // 【修改重點 2】答錯時，不再多印出那行無用的 ********，直接給出紅色警告
                    responseLog.textContent = "ACCESS DENIED. Incorrect password.";
                    responseLog.className = 'error';
                    outputDiv.appendChild(responseLog);
                }
                
                window.scrollTo(0, document.body.scrollHeight);
            }
        });
    </script>
</body>
</html>
