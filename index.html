<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart.sys / Root_Gateway</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            background-color: #050505;
            color: #0f0;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            margin: 0;
            padding: 2rem;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        /* 復古 CRT 螢幕掃描線特效 */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal-output {
            white-space: pre-wrap;
            margin-bottom: 1rem;
        }

        .input-line {
            display: none; /* 動畫結束前隱藏 */
            align-items: center;
        }

        .prompt {
            color: #0f0;
            margin-right: 10px;
        }

        input[type="password"], input[type="text"] {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            outline: none;
            width: 50%;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #0f0;
            animation: blink 1s step-end infinite;
        }

        .error { color: #f00; text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); }
        .success { color: #0ff; text-shadow: 0 0 5px rgba(0, 255, 255, 0.5); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
